<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - AI Providers | ExplainThisCode</title>
<!-- Google Fonts: Inter and JetBrains Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#0D1117',
              card: '#161B22',
              border: '#30363D',
              muted: '#8B949E',
              success: '#238636',
              link: '#58A6FF',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #0D1117;
      color: #C9D1D9;
      -webkit-font-smoothing: antialiased;
    }
    .form-input-custom {
      background-color: #000000;
      border: 1px solid #30363D;
      color: #FFFFFF;
      font-family: 'JetBrains Mono', monospace;
    }
    .form-input-custom:focus {
      border-color: #58A6FF;
      outline: none;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: AI Providers Modal -->
<div class="w-full max-w-2xl bg-brand-bg border border-brand-border rounded-xl shadow-2xl overflow-hidden" data-purpose="settings-modal-container" id="settings-modal">
<!-- BEGIN: Modal Header -->
<header class="px-6 py-4 border-b border-brand-border flex items-center justify-between">
<div class="flex items-center gap-2">
<h1 class="text-lg font-semibold text-white">AI Providers</h1>
<span class="px-2 py-0.5 text-xs font-medium bg-brand-card border border-brand-border rounded-full text-brand-muted">Settings</span>
</div>
<button aria-label="Close modal" class="text-brand-muted hover:text-white transition-colors">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</button>
</header>
<!-- END: Modal Header -->
<!-- BEGIN: Modal Content -->
<main class="p-6 space-y-6">
<p class="text-sm text-brand-muted mb-4">
        Configure your API keys to enable code explanation features. Your keys are stored locally and encrypted.
      </p>
<!-- BEGIN: Provider List -->
<section class="space-y-4" data-purpose="provider-cards-list">
<!-- BEGIN: Google Gemini Card -->
<article class="p-4 bg-brand-card border border-brand-border rounded-lg" data-purpose="google-gemini-config">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-md bg-blue-500/10 flex items-center justify-center text-blue-400">
<!-- Sparkles Icon (Material Style) -->
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
</div>
<div>
<h2 class="text-sm font-semibold text-white">Google Gemini</h2>
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
<span class="text-xs text-brand-muted">Connected</span>
</div>
</div>
</div>
<button class="px-3 py-1.5 text-xs font-medium text-white rounded-md transition-all bg-[#2F81F7] hover:bg-[#2F81F7]/90">Save</button>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-medium text-brand-muted">API Key</label>
<input class="form-input-custom w-full rounded-md text-sm px-3 py-2" placeholder="Enter Gemini API Key" type="password" value="AIzaSyA_************************"/>
</div>
</article>
<!-- END: Google Gemini Card -->
<!-- BEGIN: Anthropic Claude Card -->
<article class="p-4 bg-brand-card border border-brand-border rounded-lg" data-purpose="anthropic-claude-config">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-md bg-orange-500/10 flex items-center justify-center text-orange-400">
<!-- Abstract Shell Icon for Anthropic -->
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a10 10 0 1 0 10 10H12V2Z"></path><path d="M12 12 2.21 12"></path><path d="M12 12l4.5 4.5"></path><path d="M12 12l4.5-4.5"></path><path d="m12 12-4.5 4.5"></path></svg>
</div>
<div>
<h2 class="text-sm font-semibold text-white">Anthropic Claude</h2>
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
<span class="text-xs text-brand-muted">Connected</span>
</div>
</div>
</div>
<button class="px-3 py-1.5 text-xs font-medium text-white rounded-md transition-all bg-[#2F81F7] hover:bg-[#2F81F7]/90">Save</button>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-medium text-brand-muted">API Key</label>
<input class="form-input-custom w-full rounded-md text-sm px-3 py-2" placeholder="Enter Claude API Key" type="password" value="sk-ant-api03-************************"/>
</div>
</article>
<!-- END: Anthropic Claude Card -->
<!-- BEGIN: OpenAI Card -->
<article class="p-4 bg-brand-card border border-brand-border rounded-lg" data-purpose="openai-config">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-md bg-teal-500/10 flex items-center justify-center text-teal-400">
<!-- OpenAI Logo Style Icon -->
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path></svg>
</div>
<div>
<h2 class="text-sm font-semibold text-white">OpenAI</h2>
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
<span class="text-xs text-brand-muted">Connected</span>
</div>
</div>
</div>
<button class="px-3 py-1.5 text-xs font-medium text-white rounded-md transition-all bg-[#2F81F7] hover:bg-[#2F81F7]/90">Save</button>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-medium text-brand-muted">API Key</label>
<input class="form-input-custom w-full rounded-md text-sm px-3 py-2" placeholder="Enter OpenAI API Key" type="password" value="sk-************************"/>
</div>
</article>
<!-- END: OpenAI Card -->
</section>
<!-- END: Provider List -->
</main>
<!-- END: Modal Content -->
<!-- BEGIN: Modal Footer -->
<footer class="px-6 py-4 bg-brand-card border-t border-brand-border flex items-center justify-end gap-3">
<button class="px-4 py-2 text-sm font-medium text-brand-muted hover:text-white transition-colors">Cancel</button>
<button class="px-4 py-2 text-sm font-medium bg-white text-black hover:bg-gray-200 rounded-md transition-colors">Done</button>
</footer>
<!-- END: Modal Footer -->
</div>
<!-- END: AI Providers Modal -->
</body></html>
